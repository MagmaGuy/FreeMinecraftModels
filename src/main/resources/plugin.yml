name: FreeMinecraftModels
version: '2.5.1'
main: com.magmaguy.freeminecraftmodels.FreeMinecraftModels
api-version: 1.18
prefix: FreeMinecraftModels
load: STARTUP
authors: [ MagmaGuy ]
description: Welcome to the new age of custom Minecraft models.
website: magmaguy.com
softdepend:
  - WorldGuard
  - WorldEdit
  - GriefPrevention
  - Vault

commands:
  freeminecraftmodels:
    aliases:
      - fmm
    description: "Main command"

permissions:
  freeminecraftmodels.*:
    description: Allows access to all FreeMinecraftModels commands
    default: op
  freeminecraftmodels.admin:
    description: Allows access to the admin content browser
    default: op
  freeminecraftmodels.menu:
    description: Allows access to the craftable items menu
    default: true
  freeminecraftmodels.shop:
    description: Allows access to the furniture shop
    default: true
