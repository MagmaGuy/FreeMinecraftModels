name: FreeMinecraftModels
version: '2.6.0'
main: com.magmaguy.freeminecraftmodels.FreeMinecraftModels
api-version: '1.21.4'
prefix: FreeMinecraftModels
load: STARTUP
authors: [ MagmaGuy ]
description: Welcome to the new age of custom Minecraft models.
website: magmaguy.com
softdepend:
  - WorldGuard
  - WorldEdit
  - GriefPrevention
  - Vault

commands:
  freeminecraftmodels:
    aliases:
      - fmm
    description: "Main command"

permissions:
  freeminecraftmodels.*:
    description: Allows access to all FreeMinecraftModels commands
    default: op
    children:
      freeminecraftmodels.admin: true
      freeminecraftmodels.disguise.self: true
      freeminecraftmodels.disguise.others: true
  freeminecraftmodels.admin:
    description: Allows access to the admin content browser
    default: op
  freeminecraftmodels.disguise.self:
    description: Allows /fmm disguise / undisguise on yourself
    default: op
  freeminecraftmodels.disguise.others:
    description: Allows /fmm disguise / undisguise targeting other players, plus /fmm disguiselist
    default: op
  freeminecraftmodels.menu:
    description: Allows access to the craftable items menu
    default: true
  freeminecraftmodels.shop:
    description: Allows access to the furniture shop
    default: true
